<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AtFactoryPrice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- UI Density & Elegance Refinement -->
    <link rel="stylesheet" href="css/density-refinement.css">
    <!-- Phase 4 design system (additive) -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #000;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #000;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #333;
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        .signup-link a {
            color: #000;
            font-weight: 600;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .forgot-password {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #666;
            font-size: 0.85rem;
            text-decoration: none;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        /* Phase 4 — auth layout + form styling (afp-v2 scope) */
        .afp-v2 .afp-auth{min-height:100vh;display:grid;grid-template-columns:1fr 1.1fr;}
        .afp-v2 .afp-auth-brand{background:var(--afp-ink);color:#fff;padding:56px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;}
        .afp-v2 .afp-auth-form{padding:64px;display:flex;flex-direction:column;justify-content:center;align-items:center;background:var(--afp-paper);}
        .afp-v2 .form-group{margin-bottom:16px;}
        .afp-v2 input[type="text"],
        .afp-v2 input[type="email"],
        .afp-v2 input[type="tel"],
        .afp-v2 input[type="password"]{
          height:46px;padding:0 14px;border:1px solid var(--afp-line);background:#fff;
          border-radius:var(--afp-r-2);font:400 15px/1 var(--afp-sans);color:var(--afp-ink);outline:0;
          width:100%;transition:border-color var(--afp-d-1) var(--afp-ease),box-shadow var(--afp-d-1) var(--afp-ease);
        }
        .afp-v2 input:focus{border-color:var(--afp-ink);box-shadow:var(--afp-sh-focus);}
        .afp-v2 .form-group label{font:500 13px/1.4 var(--afp-sans);color:var(--afp-ink-2);display:block;margin-bottom:6px;}
        .afp-v2 .forgot-password{margin:8px 0 18px;}
        .afp-v2 .forgot-password a{color:var(--afp-red-600);font-size:13px;cursor:pointer;}
        .afp-v2 .signup-link{margin-top:24px;font-size:14px;color:var(--afp-ink-2);text-align:center;}
        .afp-v2 .signup-link a{color:var(--afp-red-600);font-weight:500;cursor:pointer;}
        .afp-v2 .error-message{color:var(--afp-crit);font-size:13px;margin-bottom:12px;}
        @media (max-width:880px){.afp-v2 .afp-auth{grid-template-columns:1fr;}.afp-v2 .afp-auth-brand{display:none;}.afp-v2 .afp-auth-form{padding:48px 24px;}}
    </style>
</head>
<body class="afp-v2">
    <section class="afp-auth">
      <!-- Brand panel -->
      <div class="afp-auth-brand">
        <a href="index.html" class="afp-logo">
          <span class="afp-logo-mark">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="14" width="5" height="7" fill="#fff"/>
              <rect x="9" y="9" width="5" height="12" fill="#D8262C"/>
              <rect x="15" y="3" width="5" height="18" fill="#fff"/>
              <path d="M11.5 9 L11.5 4 Q11.5 2 13 2.5 L13 9.5" stroke="#D8262C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="afp-logo-tx" style="color:#fff"><span class="at">At</span><span class="nm">Factory</span><span class="pr" style="background:#fff;color:#0A0A0B">Price</span></span>
        </a>
        <div>
          <span class="afp-eyebrow" style="color:rgba(255,255,255,.5)"><span class="afp-eyebrow-dot"></span>Welcome back</span>
          <h2 class="afp-h2" style="color:#fff;margin-top:12px;font-size:48px;">Premium fabrics.<br/><span style="color:var(--afp-red)">Factory price.</span></h2>
          <p style="color:rgba(255,255,255,.7);font-size:16px;margin-top:18px;max-width:380px;">Sign in to track orders, manage your wallet, and unlock referral rewards.</p>
        </div>
        <div class="afp-mono" style="color:rgba(255,255,255,.5);display:flex;gap:14px;">
          <span>● Lagos, NG</span>
          <span>● Since 2024</span>
          <span>● 2,400+ buyers</span>
        </div>
      </div>

      <!-- Form panel -->
      <div class="afp-auth-form">
        <div class="login-container" style="background:transparent;box-shadow:none;padding:0;max-width:420px;width:100%;">
          <h1 class="afp-h1" style="font-size:40px;">Sign in.</h1>
          <p class="afp-body-m afp-mute" style="margin-top:8px;margin-bottom:24px;">Use your email and password to continue.</p>

          <div id="errorMessage" class="error-message"></div>

          <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="john@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>

            <div class="forgot-password">
                <a href="#" onclick="resetPassword()">Forgot password?</a>
            </div>

            <button type="submit" class="btn-submit afp-btn afp-btn-brand afp-btn--lg afp-btn--block" id="submitBtn">Log In</button>
          </form>

          <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign up</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA3SzcQWEgWv51hA5CsNyj6WG1cp-sZYKA",
            authDomain: "atfactoryprice-6ba8f.firebaseapp.com",
            projectId: "atfactoryprice-6ba8f",
            storageBucket: "atfactoryprice-6ba8f.firebasestorage.app",
            messagingSenderId: "660895645396",
            appId: "1:660895645396:web:a4ea1e8febc6e0b7f74541"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMessage');

            errorDiv.classList.remove('show');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.classList.add('show');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            try {
                await auth.signInWithEmailAndPassword(email, password);
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Login error:', error);
                let errorMessage = 'Invalid email or password';
                
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Too many failed attempts. Please try again later.';
                }

                errorDiv.textContent = errorMessage;
                errorDiv.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In';
            }
        });

        // Reset password
        function resetPassword() {
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                alert('Please enter your email address first');
                return;
            }

            auth.sendPasswordResetEmail(email)
                .then(() => {
                    alert('Password reset email sent! Check your inbox.');
                })
                .catch(error => {
                    alert('Error: ' + error.message);
                });
        }
    </script>
</body>
</html>
